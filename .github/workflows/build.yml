name: CI Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        # Implements OPS-001: CI fails when any workspace build or TypeScript check fails.
        run: npm run build --workspaces --if-present
