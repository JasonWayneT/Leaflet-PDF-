<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Anton';
      src: url('../assets/fonts/Anton-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Hanken Grotesk';
      src: url('../assets/fonts/HankenGrotesk-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('../assets/fonts/JetBrainsMono-Medium.ttf') format('truetype');
    }

    :root {
      /* Values overridden by Renderer at runtime */
      --bg: #131313;
      --text: #ffffff;
      --accent1: #c7f300;
      --accent2: #ffffff;
      --border: #444444;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Hanken Grotesk', sans-serif;
      margin: 0;
      padding: 24mm 20mm;
      line-height: 1.5;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Anton', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      color: var(--text);
    }

    h1 {
      font-size: 3rem;
      border-bottom: 4px solid var(--border);
      padding-bottom: 0.2em;
    }

    h2 {
      font-size: 2rem;
      border-left: 8px solid var(--accent1);
      padding-left: 0.5em;
    }

    .bluf-section {
      background-color: var(--text);
      color: var(--bg);
      padding: 1.5em;
      margin-bottom: 2em;
      font-size: 1.1rem;
      border-radius: 4px;
      position: relative;
    }

    .bluf-section::before {
      content: 'B.L.U.F.';
      font-family: 'JetBrains Mono', monospace;
      position: absolute;
      top: -10px;
      left: -10px;
      background-color: var(--accent1);
      color: var(--bg);
      padding: 4px 8px;
      font-weight: bold;
      border: 2px solid var(--bg);
    }

    .cheat-sheet-section {
      border: 4px solid var(--accent2);
      padding: 1.5em;
      margin-top: 3em;
      background-color: transparent;
      position: relative;
    }

    .cheat-sheet-section h2 {
      margin-top: 0;
      border-left: none;
      padding-left: 0;
    }

    .cheat-sheet-section::after {
      content: '///';
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent2);
      position: absolute;
      bottom: -15px;
      right: 10px;
      font-size: 1.5rem;
      background: var(--bg);
      padding: 0 5px;
    }

    .conditional-section {
      border: 2px solid var(--border);
      padding: 1em;
      margin: 1.5em 0;
      border-radius: 2px;
    }

    .conditional-section h2 {
      font-size: 1.5rem;
      margin-top: 0;
      border-left: 4px solid var(--accent1);
    }

    code, .label {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--text);
      color: var(--bg);
      padding: 0.1em 0.3em;
      border-radius: 2px;
      font-size: 0.9em;
    }

    .content-body p {
      margin-bottom: 1em;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <div class="document-title">
    <h1>{{TITLE}}</h1>
  </div>
  
  {{BLUF_SECTION}}
  
  <div class="content-body">
    {{BODY_SECTIONS}}
  </div>
  
  {{CONDITIONAL_SECTIONS}}
  
  {{CHEAT_SHEET}}
</body>
</html>
